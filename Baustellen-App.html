<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Baustellen-Zentrale</title>
<style>
  :root{
    --bg:#eef2f6; --panel:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
    --primary:#0284c7; --primary-d:#0369a1; --accent:#16a34a; --accent-l:#dcfce7;
    --danger:#dc2626; --danger-l:#fee2e2; --warn:#d97706; --warn-l:#fef3c7;
    --neutral:#94a3b8; --shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  .hide{display:none!important}
  .wrap{max-width:1200px;margin:0 auto;padding:0 16px 60px}

  /* Passcode-Gate */
  .gate{min-height:100dvh;display:grid;place-items:center;padding:24px}
  .gate-card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:26px;width:100%;max-width:360px;text-align:center}
  .gate-card .glogo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#0284c7,#16a34a);display:grid;place-items:center;color:#fff;margin:0 auto 14px}
  .gate-card h1{font-size:20px;margin:0 0 4px}
  .gate-card p{color:var(--muted);font-size:14px;margin:0 0 18px}
  .code-in{width:100%;text-align:center;font-size:22px;letter-spacing:6px;font-weight:700;padding:12px;border:1px solid var(--line);border-radius:12px;margin-bottom:12px}
  .gate-btn{border:1px solid var(--primary);background:var(--primary);color:#fff;padding:12px 16px;border-radius:12px;font-weight:700;font-size:15px;width:100%}
  .gate-err{color:var(--danger);font-size:13px;min-height:18px;margin-top:8px}

  /* Header */
  header.top{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
  .top-in{max-width:1200px;margin:0 auto;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top));display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px;letter-spacing:-.2px}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#0284c7,#16a34a);display:grid;place-items:center;color:#fff;flex:none}
  .spacer{flex:1}
  .badge-role{font-size:12px;font-weight:800;padding:5px 11px;border-radius:999px;letter-spacing:.3px}
  .badge-role.adm{background:#ede9fe;color:#6d28d9}
  .badge-role.mit{background:var(--accent-l);color:#166534}
  .iconbtn{border:1px solid var(--line);background:var(--panel);border-radius:10px;width:38px;height:38px;display:grid;place-items:center;color:var(--muted);flex:none}
  .iconbtn:active{background:#f1f5f9}
  .iconbtn svg{width:18px;height:18px}
  .role{display:flex;background:#f1f5f9;border:1px solid var(--line);border-radius:999px;padding:3px}
  .role button{border:0;background:transparent;padding:7px 14px;border-radius:999px;font-weight:600;font-size:13px;color:var(--muted)}
  .role button.active{background:var(--panel);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .role button.active[data-r="buero"]{color:var(--primary-d)}
  .role button.active[data-r="mitarbeiter"]{color:var(--accent)}

  /* Board */
  .page-h{display:flex;align-items:baseline;gap:12px;margin:22px 0 6px;flex-wrap:wrap}
  .page-h h1{font-size:22px;margin:0;letter-spacing:-.4px}
  .page-h .sub{color:var(--muted);font-size:14px}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:9px 14px;border-radius:10px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;gap:7px}
  .btn:hover{border-color:#cbd5e1}
  .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
  .btn.primary:hover{background:var(--primary-d)}
  .btn.green{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn svg{width:16px;height:16px}

  .board{display:grid;grid-template-columns:repeat(6,minmax(215px,1fr));gap:14px;margin-top:16px;overflow-x:auto;padding-bottom:8px}
  .col{background:#e9eef4;border-radius:14px;padding:10px;min-height:120px}
  .col-h{display:flex;align-items:center;gap:8px;padding:4px 6px 10px;font-weight:700;font-size:13px;color:#475569}
  .col-h .dot{width:9px;height:9px;border-radius:50%}
  .col-h .cnt{margin-left:auto;background:#fff;border:1px solid var(--line);color:var(--muted);font-size:12px;border-radius:999px;padding:1px 8px;font-weight:700}
  .emp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;box-shadow:0 1px 2px rgba(15,23,42,.05);transition:transform .08s,box-shadow .12s}
  .emp-grid .card{margin-bottom:0}
  .card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
  .card h3{margin:0 0 3px;font-size:15px;letter-spacing:-.2px}
  .card .addr{color:var(--muted);font-size:12.5px;margin-bottom:9px;line-height:1.35}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:5px}
  .chip.crm{background:#ede9fe;color:#6d28d9}
  .chip.plan{background:#e0f2fe;color:#075985}
  .chip.rel{background:#dcfce7;color:#166534}
  .chip.ok{background:var(--accent-l);color:#166534}
  .chip.bad{background:var(--danger-l);color:#991b1b}
  .chip.pack{background:#f1f5f9;color:#475569}
  .chip svg{width:12px;height:12px}
  .card .bar{height:6px;background:#eef2f6;border-radius:4px;margin-top:10px;overflow:hidden}
  .card .bar > i{display:block;height:100%;background:var(--accent)}
  .freigabe-btn{margin-top:10px;width:100%;border:1px solid var(--line);background:#f8fafc;color:var(--muted);font-weight:700;font-size:12.5px;padding:7px;border-radius:9px;display:flex;align-items:center;justify-content:center;gap:6px}
  .freigabe-btn:hover{border-color:#a78bfa;color:#6d28d9}
  .freigabe-btn.on{background:var(--accent-l);border-color:#86efac;color:#166534}

  /* Detail */
  .detail{display:none}
  .back{background:transparent;border:0;color:var(--primary-d);font-weight:700;font-size:14px;display:inline-flex;align-items:center;gap:6px;padding:14px 2px}
  .d-head{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
  .d-head .row1{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .d-head h2{margin:0;font-size:21px;letter-spacing:-.3px}
  .d-head .addr{color:var(--muted);font-size:14px;margin-top:3px}
  .d-head .status-sel{margin-left:auto;display:flex;align-items:center;gap:8px}
  select{font-family:inherit;font-size:13.5px;font-weight:600;padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink)}
  .fr-toggle{margin-top:14px;border:1px solid #a78bfa;background:#f5f3ff;color:#6d28d9;font-weight:700;font-size:14px;padding:10px 16px;border-radius:11px;display:inline-flex;align-items:center;gap:8px;width:100%;justify-content:center}
  .fr-toggle.on{background:var(--accent-l);border-color:#86efac;color:#166534}
  .fr-toggle svg{width:17px;height:17px}
  .grid2{display:grid;grid-template-columns:1.1fr 1fr;gap:14px;margin-top:14px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
  .box h4{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}

  .drop{border:2px dashed #cbd5e1;border-radius:12px;padding:18px;text-align:center;color:var(--muted);background:#f8fafc}
  .drop b{color:var(--ink)}
  .plan-file{display:flex;align-items:center;gap:12px}
  .plan-file .thumb{width:54px;height:54px;border-radius:10px;background:#e0f2fe;display:grid;place-items:center;color:#075985;flex:none;overflow:hidden}
  .plan-file .thumb img{width:100%;height:100%;object-fit:cover}
  .plan-file .meta{flex:1;min-width:0}
  .plan-file .meta .n{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .plan-file .meta .s{color:var(--muted);font-size:12.5px}
  .plan-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}

  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .tile{border:1px solid var(--line);border-radius:12px;padding:12px;background:#f8fafc}
  .tile .k{font-size:12px;color:var(--muted);font-weight:600}
  .tile .v{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:2px}
  .tile .v small{font-size:13px;color:var(--muted);font-weight:600}
  .tile.good .v{color:var(--accent)}
  .tile.bad .v{color:var(--danger)}
  .prog{height:8px;background:#eef2f6;border-radius:5px;overflow:hidden;margin-top:10px}
  .prog > i{display:block;height:100%;background:var(--accent);transition:width .2s}

  .tbl-wrap{margin-top:16px;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden}
  .tbl-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .tbl-head h4{margin:0;font-size:15px}
  .legend{display:flex;gap:14px;margin-left:auto;font-size:12.5px;color:var(--muted);flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:12px;height:12px;border-radius:4px;display:inline-block}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{background:#f8fafc;text-align:center;font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:11px 8px;border-bottom:1px solid var(--line);position:sticky;top:0}
  thead th.mat{text-align:left;padding-left:16px}
  tbody td{padding:8px;border-bottom:1px solid #f1f5f9;text-align:center;vertical-align:middle}
  tbody td.mat{text-align:left;padding-left:16px;font-weight:600}
  tbody tr:hover{background:#f8fafc}
  tbody tr.off{opacity:.5}
  .cell-in{width:64px;text-align:center;font-size:14px;font-weight:700;padding:7px 4px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
  .cell-in:disabled{background:#f1f5f9;color:#94a3b8;font-weight:600;border-color:transparent}
  .cell-in.ben{color:var(--primary-d)}
  .cell-in::placeholder{color:#cbd5e1;font-weight:600;font-style:italic}
  .div-badge{display:inline-block;min-width:44px;padding:6px 10px;border-radius:8px;font-weight:800;font-size:14px}
  .div-badge.ok{background:var(--accent-l);color:#166534}
  .div-badge.bad{background:var(--danger-l);color:#991b1b}
  .div-badge.neutral{background:#f1f5f9;color:var(--neutral)}
  .pk{width:22px;height:22px;accent-color:var(--accent);cursor:pointer}
  .pk:disabled{cursor:not-allowed;opacity:.5}

  .hint{font-size:12.5px;color:var(--muted);padding:12px 16px;background:#f8fafc;border-top:1px solid var(--line)}
  .empty{text-align:center;color:var(--muted);padding:50px 20px;font-size:15px}
  .empty .big{font-size:34px;margin-bottom:10px}

  .center{min-height:55dvh;display:grid;place-items:center;text-align:center;color:var(--muted);padding:24px}
  .spin{width:34px;height:34px;border:3px solid #cbd5e1;border-top-color:var(--primary);border-radius:50%;animation:s .8s linear infinite;margin:0 auto 12px}
  @keyframes s{to{transform:rotate(360deg)}}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;background:#0f172a;color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:var(--shadow);transition:.25s;z-index:60;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.bad{background:var(--danger)}
  .pop{position:fixed;z-index:70;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:6px;display:none;min-width:190px}
  .pop button{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;padding:10px 12px;border-radius:8px;font-weight:600;font-size:14px;color:var(--ink);text-align:left}
  .pop button:hover{background:#f1f5f9}
  .pop .wa{color:#25D366}

  @media(max-width:820px){ .grid2{grid-template-columns:1fr} .role button{padding:7px 10px} .brand span.full{display:none} }
</style>
</head>
<body>

<!-- Login-Gate -->
<div id="gate" class="gate">
  <div class="gate-card">
    <div class="glogo"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M2 12h3M19 12h3M4.9 19.1l2.1-2.1M17 7l2.1-2.1"/></svg></div>
    <h1>Baustellen-Zentrale</h1>
    <p>Bitte Zugangscode eingeben</p>
    <input id="codeIn" class="code-in" type="tel" inputmode="numeric" maxlength="8" placeholder="••••" autocomplete="off">
    <button class="gate-btn" id="codeBtn">Anmelden</button>
    <div class="gate-err" id="codeErr"></div>
  </div>
</div>

<!-- App -->
<div id="app" class="hide">
  <header class="top">
    <div class="top-in">
      <div class="brand">
        <span class="logo"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M2 12h3M19 12h3M4.9 19.1l2.1-2.1M17 7l2.1-2.1"/></svg></span>
        <span>Baustellen<span class="full">-Zentrale</span></span>
      </div>
      <div class="spacer"></div>
      <span class="badge-role mit" id="accessBadge">Mitarbeiter</span>
      <div class="role hide" id="role">
        <button data-r="buero">Büro</button>
        <button data-r="mitarbeiter" class="active">Mitarbeiter</button>
      </div>
      <button class="iconbtn" id="reloadBtn" title="Neu laden"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 3v6h-6"/></svg></button>
      <button class="iconbtn" id="logoutBtn" title="Abmelden"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></button>
    </div>
  </header>

  <div class="wrap">
    <div id="loading" class="center"><div><div class="spin"></div>Daten werden geladen …</div></div>
    <div id="errbox" class="center hide"></div>

    <section id="dashboard" class="hide">
      <div class="page-h">
        <h1 id="pageTitle">Zentrale</h1>
        <span class="sub" id="pageSub">Pro gewonnenem Kunden eine Karte</span>
      </div>
      <div id="board"></div>
    </section>

    <section id="detail" class="detail">
      <button class="back" id="backBtn"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>Zurück</button>
      <div id="detailBody"></div>
    </section>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="pop" id="sharePop">
  <button class="wa" data-a="wa"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2Zm5.8 14.2c-.2.7-1.4 1.3-2 1.4-.5.1-1.2.1-1.9-.1-.4-.1-1-.3-1.8-.6-3-1.3-5-4.4-5.1-4.6-.2-.2-1.3-1.7-1.3-3.2 0-1.5.8-2.3 1.1-2.6.3-.3.6-.4.8-.4h.6c.2 0 .5 0 .7.5l.9 2.1c.1.2.1.4 0 .6l-.4.6c-.2.2-.4.4-.2.7.2.4.9 1.4 1.9 2.3 1.3 1.1 2.2 1.4 2.5 1.6.2.1.4.1.6-.1l.8-1c.2-.2.4-.2.6-.1l2 1c.3.1.4.2.5.3.1.2.1.8-.1 1.4Z"/></svg>Per WhatsApp senden</button>
  <button data-a="copy"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>Link kopieren</button>
</div>

<script>
/* ===== KONFIG (mit Make verbunden) ===== */
const CONFIG = {
  GET_URL:  "https://hook.eu2.make.com/9gj1j5y1ep3zfgyww8mj60pon4lbuhfd",
  SAVE_URL: "https://hook.eu2.make.com/uf4gr5b22a0x9sdpdp4nv5lpbjp475qn",
  PLAN_URL: "https://hook.eu2.make.com/rh4trtwbt6iti8efl5tseygomjs7j917",
  CODE_ADMIN: "7894",   // voller Zugriff
  CODE_MIT:   "1234"    // nur freigegebene Kunden
};
const F = {
  siteName:["Name"], siteAddr:["Adresse"], siteStatus:["Status"], siteDate:["Termin"],
  sitePlan:["Belegungsplan"], siteDeal:["HubSpot Deal ID"], siteFrei:["Freigabe Mitarbeiter"],
  mArtikel:["Artikel"], mSite:["Baustelle"], mBen:["Benoetigt","Benötigt"],
  mOut:["Outbound"], mIn:["Inbound"], mGepackt:["Gepackt"]
};
const COLUMNS = [
  ["Neu aus CRM","Neu aus CRM","#8b5cf6"],
  ["Planung Buero","Planung Büro","#0284c7"],
  ["Bereit gepackt","Bereit / gepackt","#0891b2"],
  ["Auf Baustelle","Auf Baustelle","#d97706"],
  ["Abgeschlossen","Abgeschlossen","#16a34a"],
  ["","Ohne Status","#cbd5e1"]
];
const KNOWN = new Set(COLUMNS.map(c=>c[0]).filter(Boolean));

/* ===== Helpers ===== */
const $=s=>document.querySelector(s);
function recs(x){ if(!x) return []; if(Array.isArray(x)) return x; if(Array.isArray(x.records)) return x.records; return []; }
function fv(rec,keys,def){ const f=(rec&&rec.fields)||rec||{}; for(const k of keys){ if(f[k]!==undefined&&f[k]!==null) return f[k]; } return def; }
function nz(v){ return v===""||v===null||v===undefined?"":Number(v); }
function buf(b){ return Math.max(2,Math.round(b*0.15)); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function toast(t,bad){ const el=$("#toast"); el.textContent=t; el.className="toast show"+(bad?" bad":""); clearTimeout(el._t); el._t=setTimeout(()=>el.className="toast",2200); }
function beacon(u){ const f=document.createElement("iframe"); f.style.cssText="display:none"; f.src=u; document.body.appendChild(f); setTimeout(()=>{if(f.parentNode)f.parentNode.removeChild(f);},8000); }

let state={ access:null, role:"mitarbeiter", openId:null, customers:[] };

/* ===== Daten laden ===== */
function buildCustomers(sites,materials){
  return sites.map(s=>{
    const mats=materials.filter(m=>{
      const link=fv(m,F.mSite,[]); const ids=Array.isArray(link)?link.map(x=>x&&x.id?x.id:x):[link];
      return ids.indexOf(s.id)>=0;
    }).map(m=>({ recId:m.id, name:fv(m,F.mArtikel,""), benoetigt:nz(fv(m,F.mBen,"")), outbound:nz(fv(m,F.mOut,"")), inbound:nz(fv(m,F.mIn,"")), gepackt:!!fv(m,F.mGepackt,false) }));
    const bp=fv(s,F.sitePlan,[]);
    const plan=bp.length?{ name:bp[0].filename||"Belegungsplan", url:bp[0].url||null }:null;
    let st=fv(s,F.siteStatus,""); if(!KNOWN.has(st)) st="";
    return { id:s.id, name:fv(s,F.siteName,"(ohne Name)"), address:fv(s,F.siteAddr,""), date:fv(s,F.siteDate,""), status:st, crm:!!fv(s,F.siteDeal,""), released:!!fv(s,F.siteFrei,false), plan, materials:mats };
  });
}
async function fetchAll(){
  if(window.__DATA__){ const d=window.__DATA__; return {sites:recs(d.sites), materials:recs(d.materials)}; }
  const scoped = state.access==="mit";
  let sites=null, materials=[], off="";
  for(let i=0;i<60;i++){
    const p=[]; if(scoped)p.push("scope=mit"); if(off)p.push("offset="+encodeURIComponent(off));
    const url=CONFIG.GET_URL+(p.length?"?"+p.join("&"):"");
    const r=await fetch(url,{cache:"no-store"});
    const d=await r.json();
    if(!sites) sites=recs(d.sites);
    materials=materials.concat(recs(d.materials));
    off=(d.materials&&d.materials.offset)?d.materials.offset:"";
    if(!off) break;
  }
  return {sites, materials};
}
async function load(){
  state.openId=null; $("#detail").style.display="none"; $("#dashboard").classList.add("hide");
  $("#errbox").classList.add("hide"); $("#loading").classList.remove("hide");
  try{
    const {sites,materials}=await fetchAll();
    state.customers=buildCustomers(sites,materials);
    $("#loading").classList.add("hide"); $("#dashboard").classList.remove("hide"); renderDashboard();
  }catch(e){
    $("#loading").classList.add("hide");
    $("#errbox").classList.remove("hide");
    $("#errbox").innerHTML='<div><div style="font-size:30px">⚠️</div><div style="margin:8px 0 14px">Daten konnten nicht geladen werden.</div><button class="btn primary" onclick="load()">Erneut versuchen</button></div>';
  }
}

/* ===== Logik ===== */
function divInfo(m){
  const has=(m.outbound!==""&&m.outbound!=null)||(m.inbound!==""&&m.inbound!=null);
  if(!has) return {text:"—",cls:"neutral"};
  const d=(Number(m.outbound)||0)-(Number(m.inbound)||0);
  const ok=m.benoetigt!==""&&m.benoetigt!=null&&d===Number(m.benoetigt);
  return {text:d,cls:ok?"ok":"bad"};
}
function relevant(m){ return (m.benoetigt!==""&&m.benoetigt>0)||(m.outbound!==""&&m.outbound>0); }
function stats(c){ let rel=0,packed=0,dev=0; c.materials.forEach(m=>{ if(relevant(m)){rel++; if(m.gepackt)packed++;} if(divInfo(m).cls==="bad")dev++; }); return {rel,packed,dev}; }

/* ===== Karten ===== */
function makeCard(c){
  const s=stats(c); const pct=s.rel?Math.round(s.packed/s.rel*100):0;
  let chips="";
  if(state.access==="admin"&&c.crm) chips+='<span class="chip crm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg>aus CRM</span>';
  if(c.plan) chips+='<span class="chip plan">Plan ✓</span>';
  if(state.access==="admin"&&c.released) chips+='<span class="chip rel">freigegeben</span>';
  if(s.dev>0) chips+='<span class="chip bad">'+s.dev+' Abw.</span>';
  else if(s.rel>0&&s.packed===s.rel) chips+='<span class="chip ok">stimmt</span>';
  if(s.rel>0) chips+='<span class="chip pack">'+s.packed+'/'+s.rel+' gepackt</span>';
  const card=document.createElement("div"); card.className="card";
  card.innerHTML='<h3>'+esc(c.name)+'</h3><div class="addr">'+esc(c.address)+'</div><div class="chips">'+chips+'</div>'+(s.rel?'<div class="bar"><i style="width:'+pct+'%"></i></div>':'');
  if(state.access==="admin"){
    const fb=document.createElement("button"); fb.className="freigabe-btn"+(c.released?" on":"");
    fb.innerHTML=(c.released?'✓ Freigegeben':'Für Mitarbeiter freigeben');
    fb.onclick=(e)=>{ e.stopPropagation(); toggleFreigabe(c); };
    card.appendChild(fb);
  }
  card.onclick=()=>openDetail(c.id);
  return card;
}

/* ===== Dashboard ===== */
function renderDashboard(){ if(state.access==="admin") renderBoard(); else renderEmployee(); }

function renderBoard(){
  const board=$("#board"); board.className="board"; board.innerHTML="";
  COLUMNS.forEach(([key,label,color])=>{
    const list=state.customers.filter(c=>c.status===key);
    const col=document.createElement("div"); col.className="col";
    col.innerHTML='<div class="col-h"><span class="dot" style="background:'+color+'"></span>'+label+'<span class="cnt">'+list.length+'</span></div>';
    list.forEach(c=>col.appendChild(makeCard(c)));
    board.appendChild(col);
  });
}
function renderEmployee(){
  const board=$("#board"); board.className=""; board.innerHTML="";
  const list=state.customers.slice().sort((a,b)=>{ const sa=stats(a),sb=stats(b); const da=sa.rel&&sa.packed===sa.rel?1:0, db=sb.rel&&sb.packed===sb.rel?1:0; return da-db; });
  if(!list.length){ board.innerHTML='<div class="empty"><div class="big">📭</div>Aktuell ist nichts für dich freigegeben.<br><span style="font-size:13px">Sobald dein Chef eine Baustelle freigibt, erscheint sie hier.</span></div>'; return; }
  const grid=document.createElement("div"); grid.className="emp-grid";
  list.forEach(c=>grid.appendChild(makeCard(c)));
  board.appendChild(grid);
}

/* ===== Detail ===== */
function openDetail(id){ state.openId=id; $("#dashboard").classList.add("hide"); $("#detail").style.display="block"; renderDetail(); window.scrollTo(0,0); }
function renderDetail(){
  const c=state.customers.find(x=>x.id===state.openId); if(!c) return;
  const admin=state.access==="admin";
  const isBuero=admin && state.role==="buero";
  const s=stats(c); const pct=s.rel?Math.round(s.packed/s.rel*100):0;

  let planHtml;
  if(c.plan){
    const thumb=c.plan.url?'<img src="'+c.plan.url+'" alt="">':'<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>';
    planHtml='<div class="plan-file"><div class="thumb">'+thumb+'</div><div class="meta"><div class="n">'+esc(c.plan.name)+'</div><div class="s">Belegungsplan · für die Baustelle</div></div></div>'
      +'<div class="plan-actions"><a class="btn" href="'+CONFIG.PLAN_URL+"?b="+encodeURIComponent(c.id)+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>Öffnen</a>'
      +'<button class="btn green" id="shareBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>Teilen</button></div>';
  } else {
    planHtml='<div class="drop"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg><div style="margin-top:8px">Noch kein Belegungsplan.<br><span style="font-size:12.5px">'+(admin?'Im Büro (Airtable) beim Feld „Belegungsplan" hochladen.':'Frag im Büro nach dem Belegungsplan.')+'</span></div></div>';
  }

  const rows=c.materials.map((m,i)=>{
    const d=divInfo(m);
    const sug=(m.benoetigt!==""&&m.benoetigt>0)?(Number(m.benoetigt)+buf(Number(m.benoetigt))):"";
    const off=!relevant(m)?"off":"";
    return '<tr class="'+off+'">'
      +'<td class="mat">'+esc(m.name)+'</td>'
      +'<td><input class="cell-in ben" type="number" min="0" inputmode="numeric" value="'+m.benoetigt+'" '+(isBuero?"":"disabled")+' data-i="'+i+'" data-f="benoetigt" placeholder="–"></td>'
      +'<td><input class="cell-in" type="number" min="0" inputmode="numeric" value="'+m.outbound+'" '+(isBuero?"disabled":"")+' data-i="'+i+'" data-f="outbound" placeholder="'+(sug?"≈ "+sug:"")+'"></td>'
      +'<td><input class="cell-in" type="number" min="0" inputmode="numeric" value="'+m.inbound+'" '+(isBuero?"disabled":"")+' data-i="'+i+'" data-f="inbound" placeholder="–"></td>'
      +'<td><span class="div-badge '+d.cls+'">'+d.text+'</span></td>'
      +'<td><input class="pk" type="checkbox" '+(m.gepackt?"checked":"")+' '+(isBuero?"disabled":"")+' data-i="'+i+'" data-f="gepackt"></td>'
      +'</tr>';
  }).join("");

  const statusOpts=COLUMNS.filter(x=>x[0]).map(([k,l])=>'<option value="'+k+'" '+(c.status===k?"selected":"")+'>'+l+'</option>').join("")+'<option value="" '+(c.status===""?"selected":"")+'>Ohne Status</option>';
  const statusCtrl = admin ? '<div class="status-sel"><span style="font-size:12.5px;color:var(--muted);font-weight:600">Status</span><select id="statusSel">'+statusOpts+'</select></div>' : '';
  const freigabeCtrl = admin ? '<button class="fr-toggle'+(c.released?" on":"")+'" id="frToggle">'+(c.released
      ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>Für Mitarbeiter freigegeben — tippen zum Zurücknehmen'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 11l2 2 4-4"/><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Für Mitarbeiter freigeben')+'</button>' : '';

  $("#detailBody").innerHTML=
    '<div class="d-head"><div class="row1"><div><h2>'+esc(c.name)+'</h2><div class="addr">'+esc(c.address)+(c.date?' · Termin: '+esc(c.date):'')+'</div></div>'+statusCtrl+'</div>'+freigabeCtrl+'</div>'
    +'<div class="grid2"><div class="box"><h4>Belegungsplan</h4>'+planHtml+'</div>'
    +'<div class="box"><h4>Übersicht</h4><div class="tiles">'
    +'<div class="tile"><div class="k">Gepackt</div><div class="v">'+s.packed+'<small>/'+s.rel+'</small></div><div class="prog"><i style="width:'+pct+'%"></i></div></div>'
    +'<div class="tile '+(s.dev>0?"bad":"good")+'"><div class="k">Abweichungen (rot)</div><div class="v">'+s.dev+'</div><div style="font-size:12px;color:var(--muted);margin-top:8px">'+(s.dev>0?"Bitte prüfen / nachbestellen":"Alles im grünen Bereich")+'</div></div>'
    +'</div></div></div>'
    +'<div class="tbl-wrap"><div class="tbl-head"><h4>Materialliste</h4><div class="legend">'
    +'<span><i class="sw" style="background:var(--accent-l);border:1px solid #86efac"></i> Div = Benötigt (stimmt)</span>'
    +'<span><i class="sw" style="background:var(--danger-l);border:1px solid #fca5a5"></i> Abweichung</span></div></div>'
    +'<div style="overflow-x:auto"><table><thead><tr><th class="mat">Material</th><th>Benötigt</th><th>Outbound</th><th>Inbound</th><th>Div.</th><th>Gepackt</th></tr></thead><tbody>'+rows+'</tbody></table></div>'
    +'<div class="hint"><b>Div. = Outbound − Inbound</b> (was tatsächlich verbraucht wurde). Ist der Wert gleich <b>Benötigt</b> → <span style="color:var(--accent);font-weight:700">grün</span>, sonst → <span style="color:var(--danger);font-weight:700">rot</span>. '
    +(isBuero?'Als Büro füllst du <b>Benötigt</b> aus und setzt den Status.':'Du füllst <b>Outbound</b> (Vorschlag grau), später <b>Inbound</b> aus und hakst <b>Gepackt</b> ab.')+'</div></div>';

  const ss=$("#statusSel"); if(ss) ss.onchange=e=>{ c.status=e.target.value; saveStatus(c); toast("Status gespeichert"); };
  const fr=$("#frToggle"); if(fr) fr.onclick=()=>toggleFreigabe(c);
  $("#detailBody").querySelectorAll(".cell-in,.pk").forEach(inp=>{
    const ev=inp.type==="checkbox"?"change":"input";
    inp.addEventListener(ev,e=>{
      const i=+e.target.dataset.i, f=e.target.dataset.f;
      c.materials[i][f]= f==="gepackt"? e.target.checked : (e.target.value===""?"":Number(e.target.value));
      const d=divInfo(c.materials[i]); const badge=$("#detailBody").querySelectorAll("tbody tr")[i].querySelector(".div-badge"); badge.className="div-badge "+d.cls; badge.textContent=d.text;
      refreshTiles(c); saveMaterial(c.materials[i], f);
    });
  });
  const sb=$("#shareBtn"); if(sb) sb.onclick=e=>openShare(e,c);
}
function refreshTiles(c){
  const s=stats(c); const pct=s.rel?Math.round(s.packed/s.rel*100):0;
  const tiles=$("#detailBody").querySelectorAll(".tile");
  tiles[0].querySelector(".v").innerHTML=s.packed+'<small>/'+s.rel+'</small>';
  tiles[0].querySelector(".prog > i").style.width=pct+"%";
  tiles[1].className="tile "+(s.dev>0?"bad":"good");
  tiles[1].querySelector(".v").textContent=s.dev;
  tiles[1].querySelector("div:last-child").textContent=s.dev>0?"Bitte prüfen / nachbestellen":"Alles im grünen Bereich";
}

/* ===== Speichern (Beacon) ===== */
const timers={};
function q(v){ return v===""||v==null?"":v; }
function saveMaterial(m,f){
  clearTimeout(timers[m.recId]);
  const buero = f==="benoetigt";
  timers[m.recId]=setTimeout(()=>{
    const u = buero
      ? CONFIG.SAVE_URL+"?kind=matB&id="+encodeURIComponent(m.recId)+"&benoetigt="+q(m.benoetigt)
      : CONFIG.SAVE_URL+"?kind=matM&id="+encodeURIComponent(m.recId)+"&outbound="+q(m.outbound)+"&inbound="+q(m.inbound)+"&gepackt="+(m.gepackt?"true":"false");
    beacon(u);
  },600);
}
function saveStatus(c){ beacon(CONFIG.SAVE_URL+"?kind=site&id="+encodeURIComponent(c.id)+"&status="+encodeURIComponent(c.status)); }
function toggleFreigabe(c){
  c.released=!c.released;
  beacon(CONFIG.SAVE_URL+"?kind=freigabe&id="+encodeURIComponent(c.id)+"&freigabe="+(c.released?"true":"false"));
  toast(c.released?"Für Mitarbeiter freigegeben ✓":"Freigabe zurückgenommen");
  if($("#detail").style.display==="block") renderDetail(); else renderDashboard();
}

/* ===== Teilen ===== */
let shareCtx=null;
function openShare(e,c){ shareCtx=c; const p=$("#sharePop"); const r=e.currentTarget.getBoundingClientRect(); p.style.display="block"; p.style.left=Math.min(r.left,window.innerWidth-210)+"px"; p.style.top=(r.bottom+window.scrollY+6)+"px"; }
document.addEventListener("click",e=>{ const p=$("#sharePop"); if(p.style.display==="block"&&!p.contains(e.target)&&!e.target.closest("#shareBtn"))p.style.display="none"; });
$("#sharePop").querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{ const c=shareCtx; const link=CONFIG.PLAN_URL+"?b="+encodeURIComponent(c.id);
    if(b.dataset.a==="wa"){ const txt="Belegungsplan für "+c.name+(c.address?" ("+c.address+")":"")+":\n"+link; window.open("https://wa.me/?text="+encodeURIComponent(txt),"_blank"); }
    else { navigator.clipboard&&navigator.clipboard.writeText(link); toast("Link kopiert"); }
    $("#sharePop").style.display="none";
  };
});

/* ===== Rolle / Navigation ===== */
$("#role").querySelectorAll("button").forEach(b=>{ b.onclick=()=>{ state.role=b.dataset.r; $("#role").querySelectorAll("button").forEach(x=>x.classList.toggle("active",x===b)); if($("#detail").style.display==="block") renderDetail(); }; });
$("#backBtn").onclick=()=>{ $("#detail").style.display="none"; $("#dashboard").classList.remove("hide"); renderDashboard(); };
$("#reloadBtn").onclick=load;
$("#logoutBtn").onclick=()=>{ sessionStorage.removeItem("bz_access"); location.reload(); };

/* ===== Access-UI ===== */
function applyAccessUI(){
  const admin=state.access==="admin";
  $("#role").classList.toggle("hide",!admin);
  $("#role").querySelectorAll("button").forEach(b=>b.classList.toggle("active",b.dataset.r===state.role));
  const badge=$("#accessBadge"); badge.textContent=admin?"Admin":"Mitarbeiter"; badge.className="badge-role "+(admin?"adm":"mit");
  $("#pageTitle").textContent=admin?"Zentrale":"Zu packen";
  $("#pageSub").textContent=admin?"Pro gewonnenem Kunden eine Karte":"Von deinem Chef für die Baustelle freigegeben";
}

/* ===== Gate ===== */
function startApp(access){
  state.access=access; state.role = access==="admin" ? "buero" : "mitarbeiter";
  sessionStorage.setItem("bz_access",access);
  $("#gate").classList.add("hide"); $("#app").classList.remove("hide");
  applyAccessUI(); load();
}
function unlock(){
  const v=$("#codeIn").value.trim();
  if(v===CONFIG.CODE_ADMIN){ startApp("admin"); }
  else if(v===CONFIG.CODE_MIT){ startApp("mit"); }
  else { $("#codeErr").textContent="Falscher Code."; $("#codeIn").value=""; }
}
$("#codeBtn").onclick=unlock;
$("#codeIn").addEventListener("keydown",e=>{ if(e.key==="Enter") unlock(); });
const saved=sessionStorage.getItem("bz_access");
if(saved==="admin"||saved==="mit") startApp(saved);
</script>
</body>
